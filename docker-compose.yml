services:
  nameserver:
    build: .
    command: python src/nameserver.py
    ports:
      - "9090:9090"
    networks:
      - raft-net

  node1:
    build: .
    command: python src/candidate.py node1
    environment:
      - NAMESERVER_HOST=nameserver
      - NODE1_HOST=node1
      - NODE2_HOST=node2
      - NODE3_HOST=node3
    depends_on:
      - nameserver
    volumes:
      - node1-data:/data
    networks:
      - raft-net

  node2:
    build: .
    command: python src/candidate.py node2
    environment:
      - NAMESERVER_HOST=nameserver
      - NODE1_HOST=node1
      - NODE2_HOST=node2
      - NODE3_HOST=node3
    depends_on:
      - nameserver
    volumes:
      - node2-data:/data
    networks:
      - raft-net

  node3:
    build: .
    command: python src/candidate.py node3
    environment:
      - NAMESERVER_HOST=nameserver
      - NODE1_HOST=node1
      - NODE2_HOST=node2
      - NODE3_HOST=node3
    depends_on:
      - nameserver
    volumes:
      - node3-data:/data
    networks:
      - raft-net

  client:
    build: .
    command: python src/client.py
    environment:
      - NAMESERVER_HOST=nameserver
      - AUTO_SEND_INTERVAL=5
    depends_on:
      - nameserver
      - node1
      - node2
      - node3
    networks:
      - raft-net

networks:
  raft-net:
    driver: bridge

volumes:
  node1-data:
  node2-data:
  node3-data:
